<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moscow Metro Pathfinder</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">
    <div class="auth-shell">
        <section class="auth-hero">
            <h1>Moscow Metro Pathfinder</h1>
        </section>

        <section class="auth-card">
            <div class="auth-card-header">
                <h2 id="authTitle">Đăng nhập hệ thống</h2>
            </div>

            <form id="authForm" class="auth-form" onsubmit="handleAuth(event)">
                <label class="field">
                    <span>Username</span>
                    <input type="text" id="username" placeholder="admin hoặc tài khoản bất kỳ" required>
                </label>

                <label class="field">
                    <span>Password</span>
                    <input type="password" id="password" placeholder="Nhập mật khẩu" required>
                </label>

                <button type="submit" class="btn btn-primary btn-block" id="authBtn">Đăng nhập</button>
            </form>

            <button type="button" class="auth-toggle" onclick="toggleAuthMode()">
                <span id="authToggleText">Chưa có tài khoản? Đăng ký ngay</span>
            </button>

        </section>
    </div>

    <script src="auth.js"></script>
    <script>
        checkAlreadyLoggedIn();

    </script>
</body>
</html>
