<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metro Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="admin-page">
    <div class="admin-shell">
        <aside class="admin-sidebar">
            <div class="sidebar-stack">
                <div>
                    <h1>Metro Admin</h1>
                </div>

                <nav class="admin-nav">
                    <a class="active" href="admin.html">Bảng điều khiển</a>
                    <a href="map.html">Mở bản đồ</a>
                </nav>
            </div>

            <div class="sidebar-footer">
                <div class="welcome-badge admin-badge">
                    <span>Administrator</span>
                    <strong id="adminUsername">admin</strong>
                </div>
                <button class="btn btn-danger btn-block" type="button" onclick="logout()">Đăng xuất</button>
            </div>
        </aside>

        <main class="admin-main">
            <header class="admin-header">
                <div>
                    <h2>Rerouting</h2>
                </div>
                <div class="toolbar-row">
                    <button class="btn btn-ghost" type="button" id="refreshAdminBtn">Tải lại</button>
                    <button class="btn btn-primary" type="button" id="saveClosuresBtn">Lưu</button>
                </div>
            </header>

            <section class="admin-stats" id="adminStats">
                <article class="metric-card">
                    <span>Ga</span>
                    <strong id="adminStationCount">--</strong>
                </article>
                <article class="metric-card">
                    <span>Cạnh</span>
                    <strong id="adminEdgeCount">--</strong>
                </article>
                <article class="metric-card">
                    <span>Ga đóng</span>
                    <strong id="adminBlockedStations">--</strong>
                </article>
                <article class="metric-card">
                    <span>Cạnh chặn</span>
                    <strong id="adminBlockedEdges">--</strong>
                </article>
            </section>

            <section class="admin-overview-grid">
                <article class="workspace-card overview-card">
                    <div class="status-head">
                        <h3>Đang chọn</h3>
                    </div>
                    <div class="note-grid single-row">
                        <div>
                            <span class="detail-label">Ga</span>
                            <strong id="adminStationSelectionCount">0 mục</strong>
                        </div>
                        <div>
                            <span class="detail-label">Cạnh</span>
                            <strong id="adminEdgeSelectionCount">0 mục</strong>
                        </div>
                    </div>
                </article>

                <article class="workspace-card overview-card">
                    <div class="status-head">
                        <h3>Trạng thái</h3>
                    </div>
                    <div class="admin-status-banner" id="adminStatusText">Chưa có thay đổi chưa lưu.</div>
                </article>
            </section>

            <section class="admin-grid">
                <article class="workspace-card">
                    <div class="status-head">
                        <h3>Đóng ga</h3>
                        <button class="btn btn-ghost" type="button" id="clearStationsBtn">Xóa danh sách</button>
                    </div>
                    <label class="field">
                        <span>Tìm ga</span>
                        <input type="text" id="adminStationSearch" placeholder="Nhập tên ga">
                    </label>
                    <div id="adminStationResults" class="search-results admin-results"></div>
                    <div class="selection-block">
                        <span class="detail-label">Đã chọn</span>
                        <div id="blockedStationsList" class="chip-list"></div>
                    </div>
                </article>

                <article class="workspace-card">
                    <div class="status-head">
                        <h3>Chặn cạnh</h3>
                        <button class="btn btn-ghost" type="button" id="clearEdgesBtn">Xóa danh sách</button>
                    </div>
                    <label class="field">
                        <span>Tìm edge</span>
                        <input type="text" id="adminEdgeSearch" placeholder="Nhập edge id, line id hoặc tên ga">
                    </label>
                    <div id="adminEdgeResults" class="search-results admin-results"></div>
                    <div class="selection-block">
                        <span class="detail-label">Đã chọn</span>
                        <div id="blockedEdgesList" class="chip-list"></div>
                    </div>
                </article>
            </section>
        </main>
    </div>

    <script src="auth.js"></script>
    <script src="admin.js"></script>
    <script>
        const username = requireAuth("admin");
        if (username) {
            document.getElementById("adminUsername").innerText = username;
        }
    </script>
</body>
</html>
