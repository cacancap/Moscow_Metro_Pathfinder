<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moscow_Metro_Pathfinder</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />  

    <link rel="stylesheet" href="style.css" /> 

</head>
<body>

    <div id="map"></div>
    

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script> // Thêm thư viện Leaflet
    <script src="script.js"></script>   // Thêm file JavaScript của bạn
    <script src="location.js"></script> // Thêm file JavaScript để xử lý API định vị
    <script src="draw_path.js"></script> // Thêm file JavaScript để xử lý việc vẽ đường đi

    <div id="controls">
        <button class="btn-location" onclick="getLocation()"> Vị trí hiện tại</button>
        <button class="btn-path" onclick="enablePathfindingMode()"> Vẽ đường đi mẫu</button>
        <button class="btn-clear" onclick="clearPathfinding()"> Xóa bản đồ</button>
    </div>
    <div id="myLocation"></div>
</div>

</body>
</html>
